name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Качаем ровно ту версию Gradle, под которую заточены AGP/Kotlin, и ей же
      # генерируем wrapper — так сборка не зависит от версии Gradle на раннере
      # (бинарь gradle-wrapper.jar в репозиторий не коммитим).
      - name: Bootstrap Gradle 8.11.1
        run: |
          set -e
          curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
